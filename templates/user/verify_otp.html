{% extends "base.html" %}

{% block title %}Verify OTP - SmartCart{% endblock %}

{% block extra_css %}
<!-- Link to User CSS for consistent styling -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/user.css') }}">
<style>
    .auth-footer {
        margin-top: 2rem;
        text-align: center;
        border-top: 1px solid #f1f5f9;
        padding-top: 1.5rem;
    }

    .auth-footer p {
        color: #64748b;
        font-size: 0.95rem;
    }

    .auth-footer a {
        color: var(--light-blue);
        font-weight: 700;
        text-decoration: none;
        transition: color 0.2s;
    }

    .auth-footer a:hover {
        color: var(--light-green);
    }
</style>
<script>
    function toggleMobileMenu() {
        const navLinks = document.querySelector('.nav-links');
        const hamburger = document.querySelector('.hamburger');
        navLinks.classList.toggle('active');
        hamburger.classList.toggle('active');
    }
</script>
{% endblock %}

{% block navbar %}
<nav>
    <div style="flex-wrap: wrap;">
        <a href="/">⚡ SmartCart</a>

        <button class="hamburger" onclick="toggleMobileMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/user-login">Login</a>
        </div>
    </div>
</nav>
{% endblock %}

{% block content %}
<div class="user-container" style="max-width: 450px;">
    <div class="user-header">
        <h2>🔐 Verify OTP</h2>
        <p>Complete your registration process</p>
    </div>

    <form method="POST" action="/verify-otp-user" class="user-form">
        <div class="form-group">
            <label for="otp">Enter OTP</label>
            <input type="text" id="otp" name="otp" placeholder="Enter the code sent to your email" required>
        </div>

        <div class="form-group">
            <label for="password">Create Password</label>
            <input type="password" id="password" name="password" placeholder="Create a strong password" required>
        </div>

        <div class="form-group">
            <label for="address">Add Address</label>
            <input type="text" id="address" name="address" placeholder="e.g. 123 Street, City" required>
        </div>

        <button type="submit" class="btn-primary"
            style="width: 100%; margin-top: 1.5rem; padding: 1.2rem; font-size: 1.1rem; letter-spacing: 0.5px;">✓ Verify
            & Register</button>
    </form>

    <div class="auth-footer">
        <p>Wrong email? <a href="/user-signup">Go back</a></p>
    </div>
</div>
{% endblock %}
